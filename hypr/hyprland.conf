# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

source = ~/.cache/wal/colors-hyprland.conf

# Set programs that you use
$terminal    = kitty
$fileManager = nautilus
$menu        = rofi -show drun -no-fixed-num-lines

# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = XDG_SESSION_TYPE,wayland
# env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that
# Some default env vars.
# env = AQ_DRM_DEVICES,/dev/dri/card1
# Add to your Hyprland config (~/.config/hypr/hyprland.conf):
# env = WLR_DRM_DEVICES,/dev/dri/card1
# exec-once = gsettings set org.gnome.desktop.interface cursor-theme BreezeX-RosePine-Linux
# exec-once = gsettings set org.gnome.desktop.interface cursor-size 34
#exec-once = /usr/libexec/polkit-gnome-authentication-agent-1

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =
  kb_options = compose:ralt
  follow_mouse = 1

  touchpad {
    natural_scroll = yes
  }

  sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

general {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more
  gaps_in = 2
  gaps_out = 2
  border_size = 1
  col.active_border = $color4 $color10 45deg
  col.inactive_border = rgba(afafaf5f)
  resize_on_border = true

  layout = dwindle
  #layout = master

  # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
  allow_tearing = false
}

decoration {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more
  rounding = 0
  active_opacity = 1.0
  inactive_opacity = 0.9
  blur {
    enabled = true
    size = 3
    passes = 3
    vibrancy = 0.5
    vibrancy_darkness = 0.5
  }
}

# animations {
#   enabled = no
#
#   # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
#
#   bezier = myBezier, 0.05, 0.9, 0.1, 1.05
#
#   animation = windows,     1, 7,  myBezier
#   animation = windowsOut,  1, 7,  default, popin 80%
#   animation = border,      1, 10, default
#   animation = borderangle, 1, 8,  default
#   animation = fade,        1, 7,  default
#   animation = workspaces,  1, 6,  default
# }
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05  # The 1.05 makes it bounce slightly
    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 2, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 4, default, slide
}

dwindle {
  # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
  pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = yes # you probably want this
}

master {
  # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
  # new_is_master = true
}


gesture = 3, horizontal, workspace

misc {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more
  force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
  name = epic-mouse-v1
  sensitivity = -0.5
}

# misc {
#   vrr = 0
# }
#
# cursor {
#     no_hardware_cursors = true
# }

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# windowrulev2 = float, class:(Rofi)
# windowrulev2 = center, class:(Rofi)
# windowrulev2 = stayfocused, class:(Rofi)

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, ESCAPE, exec, wlogout &

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, h, swapwindow, l  # Swap with left window
bind = $mainMod SHIFT, l, swapwindow, r  # Swap with left window
bind = $mainMod SHIFT, j, swapwindow, d  # Swap with left window
bind = $mainMod SHIFT, k, swapwindow, u  # Swap with left window

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , XF86MonBrightnessDown, exec, ~/.local/bin/brightness.sh down
bind = , XF86MonBrightnessUp,   exec, ~/.local/bin/brightness.sh up

bind = , XF86AudioRaiseVolume,  exec, ~/.local/bin/volume.sh up
bind = , XF86AudioLowerVolume,  exec, ~/.local/bin/volume.sh down
bind = , XF86AudioMute,         exec, ~/.local/bin/volume.sh mute
bind = , XF86AudioMicMute,      exec, ~/.local/bin/mic.sh

bind = SHIFT, F4, exec, ~/.local/bin/toggle_bar.sh

bind = $mainMod, W, exec, sh $HOME/.local/bin/pywal.sh | dunstify "Select wallpapers" -t 1000
# screenshot
bind =, Print, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot of region taken" -t 1000 # screenshot of a region
bind = SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot taken" -t 1000 # screenshot of the whole screen
bind = ALT SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = ALT, Tab, exec, ~/.local/bin/rofi-windows.sh
#Submap
bind=ALT,R,submap,resize
submap=resize
binde=,right,resizeactive,10 0
binde=,left,resizeactive,-10 0
binde=,up,resizeactive,0 -10
binde=,down,resizeactive,0 10
bind=,escape,submap,reset
# will reset the submap, which will return to the global submap
submap=reset

monitor = eDP-1,1920x1080@144,0x0,1

# All the EXEC-ONES
exec-once = swww-daemon &
exec-once = eww daemon
exec-once = eww open bar
exec-once = nm-applet &
exec-once = dunst &
exec-once = hypridle &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
# exec-once = systemctl --user start hyprpolkitagent
# exec-once = hyprpm reload -n
