source = /home/geek/.cache/wal/colors-hyprland.conf

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/geek/.cache/wallpapers/current_wallpaper.png
    color = rgba(25, 25, 25, 1.0)

    blur_size = 4
    blur_passes = 3
    noise = 0.0317
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.4100
    vibrancy_darkness = 0.0
}

# The Main Rectangular Panel
shape {
    monitor =
    size = 800, 400
    color = rgba(0, 0, 0, 0.55)
    rounding = 0
    border_size = 2
    border_color = $color6

    position = 0, 150
    halign = center
    valign = center
    zindex = 0
}

# Time (Focal Point)
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%I:%M %p")</b>"
    color = rgba(255, 255, 255, 1.0)
    font_size = 95
    font_family = JetBrainsMono Nerd Font
    
    position = 0, 250
    halign = center
    valign = center
    zindex = 1
}

# Date (Secondary)
label {
    monitor =
    text = cmd[update:18000000] echo "<b>$(date +"%A, %d %b")</b>"
    color = rgba(200, 200, 200, 0.9)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    
    position = 0, 160
    halign = center
    valign = center
    zindex = 1
}

# User Prompt (Subdued)
label {
    monitor =
    text = USER: $USER
    color = rgba(255, 255, 255, 0.5)
    font_size = 13
    font_family = JetBrainsMono Nerd Font

    position = 0, 90
    halign = center
    valign = center
    zindex = 1
}

# Square Input Field (Mapped to wal)
input-field {
    monitor =
    size = 350, 50
    outline_thickness = 2
    
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = 0 
    
    rounding = 0
    outer_color = $color6
    inner_color = $color0
    font_color = $color7
    check_color = $color3
    fail_color = $color1
    
    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff66"><i>Password please...</i></span>

    position = 0, 10
    halign = center
    valign = center
    zindex = 1
}

# Dynamic Quote
label {
    monitor =
    text = cmd[update:18000000] /home/geek/.config/hypr/scripts/fetch_quote.sh
    color = rgba(255, 255, 255, 0.6)
    font_size = 13
    font_family = JetBrainsMono Nerd Font

    position = 0, -110
    halign = center
    valign = center
    zindex = 1
}

# DO NOT TOUCH Warning
label {
    monitor =
    text = <b>DO NOT TOUCH</b>
    color = rgba(255, 60, 60, 0.7)
    font_size = 26
    font_family = JetBrainsMono Nerd Font

    position = 0, 90
    halign = center
    valign = bottom
    zindex = 1
}
