# 10 min: Dim screen
listener {
    timeout = 600
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# 15 min: Lock screen safely using hyprlock
listener {
    timeout = 900
    on-timeout = hyprlock
}

# 20 min: Turn screen off completely
listener {
    timeout = 1200
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

